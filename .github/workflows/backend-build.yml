name: backend-build

on:
  push:
    paths:
      - 'campus-product-sys/**'
      - '.github/workflows/backend-build.yml'
  pull_request:
    paths:
      - 'campus-product-sys/**'
      - '.github/workflows/backend-build.yml'

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campus-product-sys
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: mvn -B -q -DskipTests compile

      - name: Package
        run: mvn -B -q -DskipTests package
